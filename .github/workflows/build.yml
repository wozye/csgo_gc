name: Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    env:
      SCCACHE_GHA_ENABLED: "true"

    strategy:
      matrix:
        os: [windows-2019]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - if: matrix.os == 'windows-2019'
      name: Build Windows
      run: |
        mkdir ${{ github.workspace }}/release
        cmake -A Win32 -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -S ${{ github.workspace }} -OUTDIR=${{ github.workspace }}/release
        cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --target csgo srcds csgo_gc

    - name: Package
      shell: bash
      run: |
        cp $GITHUB_WORKSPACE/README.md $GITHUB_WORKSPACE/release/
        mkdir $GITHUB_WORKSPACE/release/licenses
        cp $GITHUB_WORKSPACE/LICENSE $GITHUB_WORKSPACE/release/licenses/LICENSE-csgo_gc.txt
        cp $GITHUB_WORKSPACE/build/_deps/cryptopp-cmake-build/cryptopp/License.txt $GITHUB_WORKSPACE/release/licenses/LICENSE-crypto++.txt
        cp $GITHUB_WORKSPACE/build/_deps/distorm-src/COPYING $GITHUB_WORKSPACE/release/licenses/LICENSE-distorm.txt
        cp $GITHUB_WORKSPACE/build/_deps/funchook-src/LICENSE $GITHUB_WORKSPACE/release/licenses/LICENSE-funchook.txt
        cp $GITHUB_WORKSPACE/build/_deps/protobuf-src/LICENSE $GITHUB_WORKSPACE/release/licenses/LICENSE-protobuf.txt
        cp $GITHUB_WORKSPACE/examples/config.txt $GITHUB_WORKSPACE/release/csgo_gc/ || true
        cp $GITHUB_WORKSPACE/examples/inventory.txt $GITHUB_WORKSPACE/release/csgo_gc/ || true
        cp $GITHUB_WORKSPACE/examples/price_sheet.txt $GITHUB_WORKSPACE/release/csgo_gc/ || true
        cp $GITHUB_WORKSPACE/examples/unusual_loot_lists.txt $GITHUB_WORKSPACE/release/csgo_gc/ || true

    - name: Zip artifacts (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        OUTNAME: csgo_gc-${{ matrix.os }}.zip
      run: |
        $out = Join-Path $env:GITHUB_WORKSPACE $env:OUTNAME
        if (Test-Path $out) { Remove-Item $out -Force }
        Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'release\*') -DestinationPath $out -Force
        Get-ChildItem $out

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: artifact-${{ matrix.os }}
        path: ${{ github.workspace }}/csgo_gc-${{ matrix.os }}.zip

  publish:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create continuous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          TAG=continuous
          files=( $(find artifacts -type f -name "*.zip") )

          if [ ${#files[@]} -gt 0 ]; then
            gh release delete "$TAG" --cleanup-tag --repo "$REPO" --yes || true
            sleep 10s
            gh release create "$TAG" --repo "$REPO" \
              --title "Continuous Build" \
              --notes "$SHA" \
              --target "$SHA"
            gh release upload "$TAG" --repo "$REPO" "${files[@]}" --clobber
          fi
